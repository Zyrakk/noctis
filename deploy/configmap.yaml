apiVersion: v1
kind: ConfigMap
metadata:
  name: noctis-config
  namespace: noctis
  labels:
    app.kubernetes.io/name: noctis
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: noctis
data:
  config.yaml: |
    noctis:
      logLevel: info
      metricsPort: 9090
      healthPort: 8080

      sources:
        telegram:
          enabled: true
          sessionFile: "/data/telegram.session"
          channels:
            - username: "ad_poheque"
            - username: "RalfHackerChannel"
            - username: "zer0day1ab"
          autoDiscovery: true

        paste:
          enabled: false

        forums:
          enabled: false

        web:
          enabled: true
          feeds:
            - name: "bleeping-computer"
              url: "https://www.bleepingcomputer.com/feed/"
              type: rss
              interval: 900s
            - name: "the-hacker-news"
              url: "https://feeds.feedburner.com/TheHackersNews"
              type: rss
              interval: 900s
            - name: "krebs-on-security"
              url: "https://krebsonsecurity.com/feed/"
              type: rss
              interval: 900s
            - name: "cisa-advisories"
              url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
              type: rss
              interval: 1800s

        tor:
          socksProxy: "127.0.0.1:9050"
          requestTimeout: 30s

      matching:
        rules:
          - name: "ransomware-keywords"
            type: keyword
            patterns: ["ransomware", "lockbit", "blackcat", "alphv", "clop", "rhysida", "akira", "play ransomware"]
            severity: high
          - name: "credential-patterns"
            type: regex
            patterns:
              - '(?i)(password|passwd|pwd)\s*[:=]\s*\S+'
              - '(?i)(api[_-]?key|apikey)\s*[:=]\s*\S{20,}'
            severity: critical
          - name: "cve-mentions"
            type: regex
            patterns:
              - 'CVE-20\d{2}-\d{4,}'
            severity: medium
          - name: "ioc-indicators"
            type: regex
            patterns:
              - '\b(?:\d{1,3}\.){3}\d{1,3}\b'
              - '[a-fA-F0-9]{64}'
              - '[a-fA-F0-9]{32}'
            severity: medium

      llm:
        provider: glm
        baseURL: "https://open.bigmodel.cn/api/coding/paas/v4"
        model: "glm-5"
        apiKey: "${NOCTIS_LLM_API_KEY}"
        maxTokens: 1024
        temperature: 0.1
        timeout: 30s
        retries: 3
        maxConcurrent: 2
        requestsPerMinute: 20

      collection:
        archiveAll: true
        classificationWorkers: 2
        entityExtractionWorkers: 1
        classificationBatchSize: 10
        maxContentLength: 50000

      discovery:
        enabled: true
        autoApprove: false
        domainBlacklist:
          - nvd.nist.gov
          - cwe.mitre.org
          - first.org
          - github.com
          - wikipedia.org
          - siemens.com
          - honeywell.com

      database:
        driver: postgres
        dsn: "${NOCTIS_DB_DSN}"

      graph:
        enabled: true

      dispatch:
        wazuh:
          enabled: false
        webhooks: []
        crds:
          enabled: false
        networkPolicy:
          enabled: false
