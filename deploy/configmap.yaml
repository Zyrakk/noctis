apiVersion: v1
kind: ConfigMap
metadata:
  name: noctis-config
  namespace: noctis
  labels:
    app.kubernetes.io/name: noctis
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: noctis
data:
  config.yaml: |
    noctis:
      logLevel: info
      metricsPort: 9090
      healthPort: 8080

      sources:
        telegram:
          enabled: true
          apiId: ${NOCTIS_TELEGRAM_API_ID}
          apiHash: "${NOCTIS_TELEGRAM_API_HASH}"
          phone: "${NOCTIS_TELEGRAM_PHONE}"
          password: "${NOCTIS_TELEGRAM_PASSWORD}"
          sessionFile: "/data/telegram.session"
          catchupMessages: 100
          channels:
            - username: "ad_poheque"
            - username: "RalfHackerChannel"
            - username: "zer0day1ab"
            - username: "ThreatHuntingFather"
            - username: "P0x3k_1N73LL1G3NC3"
          autoDiscovery: true

        paste:
          enabled: false

        forums:
          enabled: false

        web:
          enabled: true
          feeds:
            - name: "bleeping-computer"
              url: "https://www.bleepingcomputer.com/feed/"
              type: rss
              interval: 900s
            - name: "the-hacker-news"
              url: "https://feeds.feedburner.com/TheHackersNews"
              type: rss
              interval: 900s
            - name: "krebs-on-security"
              url: "https://krebsonsecurity.com/feed/"
              type: rss
              interval: 900s
            - name: "cisa-advisories"
              url: "https://www.cisa.gov/cybersecurity-advisories/all.xml"
              type: rss
              interval: 1800s

        tor:
          socksProxy: "127.0.0.1:9050"
          requestTimeout: 30s

      matching:
        rules:
          - name: "ransomware-keywords"
            type: keyword
            patterns: ["ransomware", "lockbit", "blackcat", "alphv", "clop", "rhysida", "akira", "play ransomware"]
            severity: high
          - name: "credential-patterns"
            type: regex
            patterns:
              - '(?i)(password|passwd|pwd)\s*[:=]\s*\S+'
              - '(?i)(api[_-]?key|apikey)\s*[:=]\s*\S{20,}'
            severity: critical
          - name: "cve-mentions"
            type: regex
            patterns:
              - 'CVE-20\d{2}-\d{4,}'
            severity: medium
          - name: "ioc-indicators"
            type: regex
            patterns:
              - '\b(?:\d{1,3}\.){3}\d{1,3}\b'
              - '[a-fA-F0-9]{64}'
              - '[a-fA-F0-9]{32}'
            severity: medium

      llm:
        provider: glm
        baseURL: "https://open.bigmodel.cn/api/coding/paas/v4"
        model: "glm-4.7"
        apiKey: "${NOCTIS_LLM_API_KEY}"
        maxTokens: 1024
        temperature: 0.1
        timeout: 30s
        retries: 3
        maxConcurrent: 2
        requestsPerMinute: 20
        tokensPerMinute: 3000

      llmFast:
        provider: groq
        baseURL: "https://api.groq.com/openai/v1"
        model: "meta-llama/llama-4-scout-17b-16e-instruct"
        apiKey: "${NOCTIS_GROQ_API_KEY}"
        maxConcurrency: 5
        tokensPerMinute: 300000
        tokensPerDay: 0

      llmBrain:
        provider: gemini
        baseURL: "https://generativelanguage.googleapis.com/v1beta/openai"
        model: "gemini-3.1-pro-preview"
        apiKey: "${NOCTIS_GEMINI_API_KEY}"
        maxConcurrent: 2
        tokensPerMinute: 60000
        monthlyBudgetUSD: 17.0
        inputCostPer1M: 2.0
        outputCostPer1M: 12.0

      collection:
        archiveAll: true
        classificationWorkers: 8
        entityExtractionWorkers: 1
        librarianWorkers: 1
        classificationBatchSize: 10
        maxContentLength: 50000

      discovery:
        enabled: true
        autoApprove: false
        domainBlacklist:
          - nvd.nist.gov
          - cwe.mitre.org
          - first.org
          - github.com
          - siemens.com
          - honeywell.com
          - wikipedia.org
          - reddit.com
          - stackoverflow.com
          - medium.com
          - twitter.com
          - x.com
          - linkedin.com
          - facebook.com
          - instagram.com
          - youtube.com
          - t.me
          - olx.kz
          - m.olx.kz
          - 2gis.kz
          - satu.kz
          - ping-admin.com
          - chatgpt.com
          - chat.openai.com
          - claude.ai
          - merriam-webster.com
          - arduino.cc
          - kickstarter.com
          - translate.kagi.com
          - codebeautify.org
          - jsonformatter.org
          - go.dev
          - obsidian.md
          - arena.ai
          - threads.com
          - threadreaderapp.com
          - react.dev
          - android-developers.googleblog.com
          - unsloth.ai
          - sarvam.ai
          - huggingface.co
          - inova.kz
          - currenttime.tv
          - ctftime.org
          - raw.githubusercontent.com
          - app.prospeo.io
          - profitday.kz
          - sts.kz
          - dev.1c-bitrix.ru
          - cellebrite.com
          - fortra.com
          - cdn.13cubed.com
          - static1.squarespace.com
          - bbs.kafan.cn
          - tengrinews.kz
          - offsec.com
          - kali.org
          - voidstarsec.com
          - cipherlist.kz

      database:
        driver: postgres
        dsn: "${NOCTIS_DB_DSN}"

      graph:
        enabled: true

      correlation:
        enabled: true
        intervalMinutes: 15
        minEvidenceThreshold: 3
        temporalWindowHours: 48

      analyst:
        enabled: true
        intervalMinutes: 120
        batchSize: 5
        minSignalCount: 2
        promoteThreshold: 0.7

      iocLifecycle:
        enabled: true
        intervalMinutes: 60
        deactivateThreshold: 0.1

      briefGenerator:
        enabled: true
        scheduleHour: 6

      vuln:
        enabled: true
        intervalHours: 6
        nvdApiKey: "${NOCTIS_NVD_API_KEY}"

      enrichment:
        enabled: true
        intervalMinutes: 30
        batchSize: 20
        abuseipdbKey: "${NOCTIS_ABUSEIPDB_KEY}"
        virusTotalKey: "${NOCTIS_VT_KEY}"

      dashboard:
        enabled: true
        port: 3000
        apiKey: "${NOCTIS_DASHBOARD_API_KEY}"

      # Planned — not yet implemented
      dispatch:
        wazuh:
          enabled: false
        webhooks: []
        crds:
          enabled: false
        networkPolicy:
          enabled: false
