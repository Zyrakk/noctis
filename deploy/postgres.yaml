apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: noctis-postgres-data
  namespace: noctis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-shared
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: noctis-postgres
  namespace: noctis
  labels:
    app.kubernetes.io/name: noctis-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: noctis
spec:
  serviceName: noctis-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: noctis-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: noctis-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: noctis
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: noctis
            - name: POSTGRES_USER
              value: noctis
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: noctis-secrets
                  key: NOCTIS_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "noctis"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "noctis"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: noctis-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: noctis-postgres
  namespace: noctis
  labels:
    app.kubernetes.io/name: noctis-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: noctis
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: noctis-postgres
