apiVersion: apps/v1
kind: Deployment
metadata:
  name: noctis
  namespace: noctis
  labels:
    app.kubernetes.io/name: noctis
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: noctis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: noctis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: noctis
        app.kubernetes.io/component: daemon
        app.kubernetes.io/part-of: noctis
    spec:
      containers:
        - name: noctis
          image: ghcr.io/zyrakk/noctis:latest
          args: ["serve", "--config", "/etc/noctis/config.yaml"]
          ports:
            - containerPort: 9090
              name: metrics
            - containerPort: 8080
              name: health
          env:
            - name: NOCTIS_PROMPTS_DIR
              value: "/prompts"
          envFrom:
            - secretRef:
                name: noctis-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/noctis
              readOnly: true
            - name: data
              mountPath: /data
            - name: telegram-session
              mountPath: /data/telegram.session
              subPath: telegram.session
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: noctis-config
        - name: data
          emptyDir: {}
        - name: telegram-session
          secret:
            secretName: noctis-telegram-session
---
apiVersion: v1
kind: Service
metadata:
  name: noctis-metrics
  namespace: noctis
  labels:
    app.kubernetes.io/name: noctis
    app.kubernetes.io/component: daemon
    app.kubernetes.io/part-of: noctis
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
    - port: 8080
      targetPort: health
      protocol: TCP
      name: health
  selector:
    app.kubernetes.io/name: noctis
