<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noctis - AI-Powered Threat Intelligence</title>
  <meta name="description" content="Noctis: AI-Powered Threat Intelligence Platform. Multi-source collection, AI classification, IOC extraction, entity graph analysis." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='26' font-family='system-ui' font-size='28' font-weight='300' fill='%237c3aed'>N</text></svg>" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            noctis: {
              bg: '#0a0a0f',
              surface: '#12121a',
              surface2: '#1a1a2e',
              border: '#2a2a3e',
              purple: '#7c3aed',
              'purple-light': '#8b5cf6',
              'purple-glow': '#a78bfa',
              blue: '#3b82f6',
              'blue-light': '#60a5fa',
              cyan: '#06b6d4',
              green: '#10b981',
              text: '#e2e8f0',
              muted: '#94a3b8',
              dim: '#64748b',
            },
            severity: {
              critical: '#ef4444',
              high: '#f97316',
              medium: '#eab308',
              low: '#3b82f6',
              info: '#6b7280',
            },
          },
          fontFamily: {
            heading: ['Fira Sans', 'sans-serif'],
            body: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts: Fira Code + Fira Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Import Map for React ecosystem from esm.sh -->


  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fira Sans', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #12121a; }
    ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a4e; }
    /* Skeleton loading animation */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #12121a 25%, #1a1a2e 50%, #12121a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    /* Slow ambient background blobs */
    @keyframes drift-1 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(60px, -40px); }
      66% { transform: translate(-30px, 30px); }
    }
    @keyframes drift-2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-50px, 50px); }
      66% { transform: translate(40px, -20px); }
    }
    .hero-blob-1 {
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%);
      border-radius: 50%;
      top: 10%; left: 15%;
      animation: drift-1 80s ease-in-out infinite;
      pointer-events: none;
    }
    .hero-blob-2 {
      position: absolute;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
      border-radius: 50%;
      top: 40%; right: 10%;
      animation: drift-2 70s ease-in-out infinite;
      pointer-events: none;
    }
    /* Grid pattern background */
    .grid-bg {
      background-image:
        linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react/": "https://esm.sh/react@18/",
      "react-dom": "https://esm.sh/react-dom@18",
      "react-dom/": "https://esm.sh/react-dom@18/",
      "react-router-dom": "https://esm.sh/react-router-dom@6",
      "recharts": "https://esm.sh/recharts@2",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0"
    }
  }
  </script>
  <script type="module" crossorigin src="/app.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
